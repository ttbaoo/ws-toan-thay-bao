<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng ký tài khoản luyện thi trực tuyến tại Thầy Bảo.">
    <title>Đăng Ký - Thầy Bảo</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header" id="header">
        <a href="index.html" class="logo">
            <span class="logo-icon">🎓</span>
            Thầy Bảo
        </a>

        <nav class="nav" id="nav">
            <a href="index.html">Trang Chủ</a>
            <a href="#">Khóa Học</a>
            <a href="luyen-de.html">Luyện Đề</a>
            <a href="#">Tài Liệu</a>
            <a href="#">Liên Hệ</a>
        </nav>

        <div class="auth-buttons">
            <a href="dang-nhap.html" class="btn-login">Đăng Nhập</a>
            <a href="dang-ky.html" class="btn-register">Đăng Ký</a>
        </div>

        <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- AUTH PAGE -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-illustration">
                <img src="images/register-illustration.png" alt="Đăng ký">
                <h2>Gia nhập lớp học!</h2>
            </div>

            <div class="auth-form-container">
                <h1 class="auth-form-title">Đăng Ký</h1>
                <p class="auth-form-subtitle">Tạo tài khoản để bắt đầu hành trình chinh phục kỳ thi</p>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullname">Họ và tên</label>
                        <div class="form-input-wrapper">
                            <input type="text" id="fullname" class="form-input" placeholder="Nhập họ và tên..."
                                required>
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <div class="form-input-wrapper">
                            <input type="tel" id="phone" class="form-input" placeholder="Nhập số điện thoại..."
                                required>
                            <span class="input-icon">📱</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dateOfBirth">Ngày sinh</label>
                        <div class="form-input-wrapper">
                            <input type="date" id="dateOfBirth" class="form-input" required>
                            <span class="input-icon">🎂</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="className">Lớp</label>
                        <div class="form-input-wrapper">
                            <select id="className" class="form-input" required>
                                <option value="">Chọn lớp...</option>
                                <option value="10A1">10A1</option>
                                <option value="10A2">10A2</option>
                                <option value="10A3">10A3</option>
                                <option value="10A4">10A4</option>
                                <option value="10A5">10A5</option>
                                <option value="10A6">10A6</option>
                                <option value="10A7">10A7</option>
                                <option value="10A8">10A8</option>
                                <option value="10A9">10A9</option>
                                <option value="10A10">10A10</option>
                                <option value="10A11">10A11</option>
                                <option value="10A12">10A12</option>
                                <option value="10A13">10A13</option>
                                <option value="10A14">10A14</option>
                                <option value="10A15">10A15</option>
                                <option value="11A1">11A1</option>
                                <option value="11A2">11A2</option>
                                <option value="11A3">11A3</option>
                                <option value="11A4">11A4</option>
                                <option value="11A5">11A5</option>
                                <option value="11A6">11A6</option>
                                <option value="11A7">11A7</option>
                                <option value="11A8">11A8</option>
                                <option value="11A9">11A9</option>
                                <option value="11A10">11A10</option>
                                <option value="11A11">11A11</option>
                                <option value="11A12">11A12</option>
                                <option value="11A13">11A13</option>
                                <option value="11A14">11A14</option>
                                <option value="11A15">11A15</option>
                                <option value="12A1">12A1</option>
                                <option value="12A2">12A2</option>
                                <option value="12A3">12A3</option>
                                <option value="12A4">12A4</option>
                                <option value="12A5">12A5</option>
                                <option value="12A6">12A6</option>
                                <option value="12A7">12A7</option>
                                <option value="12A8">12A8</option>
                                <option value="12A9">12A9</option>
                                <option value="12A10">12A10</option>
                                <option value="12A11">12A11</option>
                                <option value="12A12">12A12</option>
                                <option value="12A13">12A13</option>
                                <option value="12A14">12A14</option>
                                <option value="12A15">12A15</option>
                            </select>
                            <span class="input-icon">🏫</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="avatarUrl">Ảnh đại diện (đường dẫn)</label>
                        <div class="form-input-wrapper">
                            <input type="url" id="avatarUrl" class="form-input"
                                placeholder="https://example.com/avatar.jpg" required>
                            <span class="input-icon">🖼️</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="form-input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu..."
                                required>
                            <span class="input-icon">🔒</span>
                            <button type="button" class="toggle-password" data-target="password">👁</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Nhập lại mật khẩu</label>
                        <div class="form-input-wrapper">
                            <input type="password" id="confirmPassword" class="form-input"
                                placeholder="Nhập lại mật khẩu..." required>
                            <span class="input-icon">🔒</span>
                            <button type="button" class="toggle-password" data-target="confirmPassword">👁</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Đăng Ký</button>
                </form>

                <div class="auth-switch">
                    Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
