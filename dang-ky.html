<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng ký tài khoản luyện thi trực tuyến tại Thầy Bảo.">
    <title>Đăng Ký - Thầy Bảo</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header" id="header">
        <a href="index.html" class="logo">
            <span class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5"/></svg>
            </span>
            Thầy Bảo
        </a>

        <nav class="nav" id="nav">
            <a href="index.html">Trang Chủ</a>
            <a href="#">Khóa Học</a>
            <a href="luyen-de.html">Luyện Đề</a>
            <a href="#">Tài Liệu</a>
            <a href="#">Liên Hệ</a>
        </nav>

        <div class="auth-buttons">
            <a href="dang-nhap.html" class="btn-login">Đăng Nhập</a>
            <a href="dang-ky.html" class="btn-register">Đăng Ký</a>
        </div>

        <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- AUTH PAGE -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-illustration">
                <img src="images/register-illustration.png" alt="Đăng ký tài khoản">
                <h2>Gia nhập lớp học!</h2>
            </div>

            <div class="auth-form-container">
                <h1 class="auth-form-title">Đăng Ký</h1>
                <p class="auth-form-subtitle">Tạo tài khoản để bắt đầu hành trình chinh phục kỳ thi</p>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullname">Họ và tên</label>
                        <div class="form-input-wrapper">
                            <input type="text" id="fullname" class="form-input" placeholder="Nhập họ và tên..."
                                required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <div class="form-input-wrapper">
                            <input type="tel" id="phone" class="form-input" placeholder="Nhập số điện thoại..."
                                required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dateOfBirth">Ngày sinh</label>
                        <div class="form-input-wrapper">
                            <input type="date" id="dateOfBirth" class="form-input" required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="form-input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu..."
                                required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </span>
                            <button type="button" class="toggle-password" data-target="password" aria-label="Hiện mật khẩu">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Nhập lại mật khẩu</label>
                        <div class="form-input-wrapper">
                            <input type="password" id="confirmPassword" class="form-input"
                                placeholder="Nhập lại mật khẩu..." required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </span>
                            <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Hiện mật khẩu">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Đăng Ký</button>
                </form>

                <div class="auth-switch">
                    Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
